name: Test Suite

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            extras: dev
            pytest_args: ./tests --ignore=tests/integrations/garak --ignore=tests/integrations/pyrit
          - name: garak
            extras: dev,garak
            pytest_args: tests/integrations/garak
          - name: pyrit
            extras: dev,pyrit
            pytest_args: tests/integrations/pyrit
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system ".[${{ matrix.extras }}]"

      - name: Run tests
        run: pytest ${{ matrix.pytest_args }}
