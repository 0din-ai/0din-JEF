name: Test Suite

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            extras: dev
            pytest_args: ./tests --ignore=tests/integrations/garak --ignore=tests/integrations/pyrit
          - name: garak
            extras: dev,garak
            pytest_args: tests/integrations/garak
          - name: pyrit
            extras: dev,pyrit
            pytest_args: tests/integrations/pyrit
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system ".[${{ matrix.extras }}]"

      - name: Run tests
        run: pytest ${{ matrix.pytest_args }}
